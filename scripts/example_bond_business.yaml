"""
业务模型蒸馏智能体示例输入文件

说明：
- 此文件为YAML格式，描述需要蒸馏的业务线信息
- 包含：业务目标、标杆分析、数据关联、角色定义、分析维度、动作模型
- 供 distillation_agent.py 读取使用

使用方法：
    python distillation_agent.py --input example_bond_business.yaml --output ./output
"""

import yaml

EXAMPLE_YAML = """
