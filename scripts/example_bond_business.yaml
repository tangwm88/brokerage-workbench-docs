# ============================================
# 分析模型：5维度（核心约束：3-5个）
# ============================================

analysis_dimensions:
  - name: "偿债能力"
    plain_language: "发行人到期能不能还本付息？"
    objective_data: "近3年经营性现金流净额/资产负债率/利息覆盖倍数/同业对比"
    output: "偿债能力判断（通过/注意/不通过）"
    analysis_framework: |
      【现金流覆盖】
        ├─ 近3年平均经营性现金流净额
        ├─ 本期债券年本息
        └─ 现金流覆盖率≥1.5倍通过
      
      【资产负债结构】
        ├─ 资产负债率≤70%通过
        └─ 有息债务/净资产≤40%通过
      
      【盈利能力】
        ├─ 近3年净利润连续为正
        └─ 利息覆盖倍数≥3.0倍通过
      
      【同业对比】
        ├─ 同业资产负债率中位数
        └─ 发行人对比：低于/持平/高于同业
  
  - name: "发行方案"
    plain_language: "发多少、发多久、利率定多少、怎么还钱？"
    objective_data: "拟发行规模/期限/利率/还本付息方式"
    output: "发行方案合理性判断（通过/注意/不通过）"
    analysis_framework: |
      【规模参数】
        ├─ 拟发行规模
        ├─ 累计债券余额/净资产≤40%通过
        └─ 发行后资产负债率≤80%通过
      
      【期限参数】
        ├─ 拟发行期限
        ├─ 资金使用周期匹配
        └─ 偿债高峰分析
      
      【利率参数】
        ├─ 主体评级
        ├─ 同评级近期发行利率区间
        └─ 建议利率区间
      
      【还本付息】
        ├─ 还本节奏与现金流匹配
        └─ 偿债压力分布
  
  - name: "市场窗口"
    plain_language: "现在发债是不是好时候？投资者买不买？利率高不高？"
    objective_data: "利率环境/同类型发行/投资者需求/监管环境"
    output: "市场窗口判断（有利/中性/不利）"
    analysis_framework: |
      【利率环境】
        ├─ 10年期国债收益率
        ├─ 近3个月走势
        └─ 央行货币政策
      
      【同类型发行】
        ├─ 近1个月同评级债券发行只数
        ├─ 平均认购倍数
        └─ 近期失败/取消案例
      
      【投资者需求】
        ├─ 我方投资者覆盖数量
        └─ 主要投资者配置需求
      
      【监管环境】
        ├─ 近3月同类型审批通过率
        └─ 发行人所属行业监管态度
  
  - name: "资金用途"
    plain_language: "募投项目有没有明确用途？钱怎么花？能不能讲清楚故事？"
    objective_data: "募投项目备案/资金分配/IRR测算/偿债来源"
    output: "资金用途合理性判断（通过/注意/不通过）"
    analysis_framework: |
      【项目真实性】
        ├─ 项目备案/核准状态
        ├─ 环评/土地等前置文件
        └─ 项目可行性研究
      
      【资金分配】
        ├─ 项目资金/补流比例
        └─ 补流≤监管上限
      
      【效益测算】
        ├─ 项目IRR
        └─ IRR≥利率+3%通过
      
      【偿债来源】
        ├─ 来源1：经营性现金流
        └─ 来源2：募集资金项目收益
  
  - name: "增信合规"
    plain_language: "客户历史上有没有违规？签完字会不会被追责？"
    objective_data: "主体评级/历史处罚/担保抵押/合规状态"
    output: "合规风险评估（通过/注意/不通过）"
    analysis_framework: |
      【主体评级】
        ├─ 评级机构
        └─ 最新评级结果
      
      【历史合规】
        ├─ 近3年处罚记录
        ├─ 当前被调查状态
        └─ 历史违约/展期记录
      
      【担保抵押】
        ├─ 担保人资质
        ├─ 抵押物评估价值
        └─ 增信措施可执行性
      
      【合规状态】
        ├─ 是否符合法定发行条件
        └─ 决策程序完整性

# ============================================
# 动作模型：事件-触发-步骤-输出-异常
# ============================================

events:
  - event_name: "债券发行线索录入"
    trigger_condition: "发现客户有债券发行意向或系统识别潜在债券融资需求"
    event_level: "常规"
    actions:
      - name: "线索核实与初步触达"
        trigger: "收到债券发行线索"
        steps:
          - "查询客户基本信息（已发行债券余额、主体评级、近期财务概况）"
          - "判断线索来源可靠性（客户直接表达/第三方传闻/市场传闻）"
          - "选择触达方式（电话/微信/正式拜访），优先联系已知关键人"
          - "首次沟通确认3个事实：是否有真实融资需求、拟融资规模区间、计划发行时间窗口"
          - "记录沟通结果，更新线索状态"
        output: "《线索跟进记录》+ 线索状态更新：[待核实]/[意向确认]/[暂无意向]/[需持续培育]"
        exception_handling:
          客户关键人无法触达: "尝试经办人/董秘 → 仍无法触达 → 标记'触达困难' → 组织者协调资源"
          客户否认有融资需求: "标记'暂无意向' → 纳入培育池 → 季度回访"
          客户反馈信息与线索不符: "记录差异 → 更新线索信息 → 重新评估"
        deadline: "2个工作日内"
        risk_level: "可以"
      
      - name: "线索登记与资源预判"
        trigger: "收到债券发行线索"
        steps:
          - "登记线索到投行经营看板（客户名称、预计规模、预计时间、来源）"
          - "预判资源需求：是否需要特定产业/区域团队支持、预计占用承销额度"
          - "检查是否有历史项目冲突（同一客户是否有在执行的同类项目）"
          - "判断线索优先级（高/中/低）"
        output: "《线索登记台账》更新 + 资源预判结论：[需专项支持]/[常规跟进]/[暂不投入]"
        exception_handling:
          发现历史项目冲突: "标记冲突 → 通知客户经理确认是否为新增需求 → 如为新增，评估是否合并"
          预计规模超大: "标记'需协调' → 启动资源调配流程"
        deadline: "1个工作日内"
        risk_level: "可以"
  
  - event_name: "立项评估启动"
    trigger_condition: "客户确认有债券发行意向，已提供初步发行参数"
    event_level: "重点"
    actions:
      - name: "启动5维度分析模型评估"
        trigger: "客户确认债券发行意向，已获取初步参数"
        steps:
          - "收集基础数据：发行人近3年审计报告、已发行债券余额、主体评级报告、拟发行参数"
          - "调用债券业务分析模型v2.0，完成5维度分析（偿债/方案/市场/资金/合规）"
          - "整理分析结果，形成初步判断：通过项、注意项、不通过项清单"
          - "提交立项评估申请（含5维度分析报告）"
        output: "《债券发行立项评估表》+ 初步立项建议：[建议立项]/[谨慎推进]/[建议暂缓]"
        exception_handling:
          财务数据缺失: "标记'数据缺失' → 要求客户提供 → 限3个工作日内补全 → 超时自动预警"
          核心指标不通过: "记录不通过项 → 不禁止立项但需列明风险 → 提交质控内核重点审查"
          发行人处于被调查状态: "标记'重大合规风险' → 立即停止评估 → 提交组织者判断是否继续"
        deadline: "3个工作日内"
        risk_level: "必须确认"
      
      - name: "预评估质量把关"
        trigger: "客户经理提交立项评估申请"
        steps:
          - "审查5维度分析的数据来源是否可靠"
          - "核查关键计算是否正确（现金流覆盖率/利息覆盖倍数/累计债券余额）"
          - "检查是否有重大合规风险遗漏（处罚记录/被调查状态/违约历史）"
          - "判断分析结论是否客观（有无过度乐观/悲观）"
          - "输出预评估意见"
        output: "《预评估意见》（数据质量/计算核查/合规筛查/结论判断）"
        exception_handling:
          发现数据造假嫌疑: "标记'数据异常' → 要求独立数据源复核 → 提交组织者启动专项核查"
          发现重大合规遗漏: "标记'重大合规风险' → 退回客户经理补充 → 同步组织者"
        deadline: "2个工作日内"
        risk_level: "必须确认"
      
      - name: "政策环境初判"
        trigger: "债券发行线索确认后"
        steps:
          - "查询当前监管政策环境：该类债券最新监管要求、近期同类项目审核通过率"
          - "判断发行人所属产业是否属于支持/限制/禁止类"
          - "初步判断申报可行性（政策层面）"
        output: "《政策环境初判》（政策环境/同类通过率/产业分类/申报可行性）"
        exception_handling:
          该产业近期审核明显收紧: "标记'政策风险' → 建议暂缓申报 → 同步组织者"
          监管政策近期有重大变化: "标记'政策变化' → 更新内部政策库 → 通知所有相关项目组"
        deadline: "2个工作日内"
        risk_level: "可以"
  
  - event_name: "发行方案设计"
    trigger_condition: "立项评估通过，客户已确认启动项目"
    event_level: "重点"
    actions:
      - name: "设计发行方案"
        trigger: "立项评估通过，进入方案设计"
        steps:
          - "基于债券分析模型v2.0维度2（发行方案）细化设计：规模/期限/利率/还本付息"
          - "基于维度4（资金用途）审核募投项目：备案状态/资金分配/IRR测算"
          - "基于维度5（增信合规）评估增信需求：担保/抵押/质押"
          - "形成《发行方案建议书》初稿"
        output: "《发行方案建议书》（规模/期限/利率/还本付息/资金分配/增信安排）"
        exception_handling:
          累计债券余额接近40%红线: "建议压缩规模或偿还存量 → 与客户协商 → 如客户坚持原规模 → 标记'余额风险' → 组织者判断"
          主体评级低于AA: "利率建议区间显著偏高 → 建议增信措施 → 如客户不接受增信 → 标记'利率风险'"
          募投项目备案未完成: "标记'备案缺失' → 建议先完成备案 → 或调整资金用途为补流（比例受限）"
        deadline: "5个工作日内"
        risk_level: "必须确认"
      
      - name: "协调客户确认方案参数"
        trigger: "立项通过"
        steps:
          - "向客户索取/确认发行参数：规模/资金用途/期限范围/增信方式"
          - "协调客户与产品支持沟通"
          - "收集客户对初稿方案的反馈"
          - "推动客户确认方案框架"
        output: "《客户方案确认记录》（客户参数/反馈意见/确认状态）"
        exception_handling:
          客户拒绝提供关键参数: "标记'信息缺失' → 说明监管要求 → 如仍拒绝 → 标记'合规风险' → 组织者判断"
          客户坚持明显不可行的方案: "记录客户要求 → 产品支持出具风险提示 → 客户签字确认"
        deadline: "与产品支持方案设计并行，5个工作日内"
        risk_level: "必须确认"
  
  - event_name: "申报材料准备"
    trigger_condition: "发行方案确认，开始制作申报全套材料"
    event_level: "重点"
    actions:
      - name: "协调尽职调查与材料收集"
        trigger: "发行方案确认"
        steps:
          - "启动尽职调查程序：制定尽调清单、协调客户准备基础材料"
          - "收集募投项目相关材料：备案文件/可研报告/前置文件"
          - "收集增信材料（如有）：担保函/抵押评估报告"
          - "协调律师、会计师进场"
          - "跟进材料收集进度，每日更新《材料收集进度表》"
        output: "《尽调工作底稿》+ 《材料收集进度表》+ 关键材料扫描件"
        exception_handling:
          客户拖延提供材料: "第3日发送催办函 → 第5日升级为客户经理上级催办 → 第7日提交组织者协调"
          募投项目备案未完成: "标记'前置条件缺失' → 评估是否可改为补充流动资金 → 如不可改 → 暂停材料准备"
          担保人资质不足: "标记'增信不足' → 建议更换担保人或增加抵押 → 客户确认"
        deadline: "10个工作日内"
        risk_level: "必须确认"
      
      - name: "制作募集说明书等申报文件"
        trigger: "发行方案确认"
        steps:
          - "编制募集说明书：基本情况/财务数据/资金用途/偿债措施/风险披露"
          - "编制发行公告/承销协议等法律文件"
          - "引用数据质量检查（交叉核对Wind/审计报告/评级报告）"
          - "格式合规检查（符合交易所/银行间市场格式要求）"
        output: "《募集说明书》初稿 + 《发行公告》初稿 + 《承销协议》初稿 + 数据引用核对表"
        exception_handling:
          募集说明书引用数据与审计报告不一致: "标记'数据冲突' → 以审计报告为准 → 修改说明书 → 记录差异原因"
          风险因素披露不充分: "标记'披露不足' → 补充风险条目 → 合规审查确认"
        deadline: "10个工作日内"
        risk_level: "必须确认"
      
      - name: "适当性与合规初审"
        trigger: "产品支持提交募集说明书初稿"
        steps:
          - "审查发行人合规状态：法定条件/违规记录/决策程序"
          - "审查募集说明书合规性：信息披露/风险因素/资金用途"
          - "审查适当性：投资者适当性安排"
        output: "《合规初审意见》（发行人合规状态/说明书审查/适当性审查）"
        exception_handling:
          发行人不符合法定发行条件: "标记'法定障碍' → 暂停申报 → 评估是否有补救路径"
          发现新增合规风险: "标记'新增风险' → 更新风险披露 → 质控内核复核"
        deadline: "5个工作日内"
        risk_level: "必须确认"
  
  - event_name: "监管申报前复核"
    trigger_condition: "全套申报材料准备完成，提交监管申报前的内部复核"
    event_level: "重大"
    actions:
      - name: "项目质量分析"
        trigger: "全套申报材料齐备"
        steps:
          - "执行项目质量分析模型：材料完整性/数据质量/逻辑质量/风险可控性"
          - "独立复核5维度分析结论（重新计算关键指标）"
          - "出具质控报告"
        output: "《质控报告》（A/B/C/D评级 + 完整性/数据/逻辑/风险评估）"
        exception_handling:
          发现数据重大错误: "标记'数据错误' → 退回产品支持修正 → 重新复核"
          项目质量评级为C或D: "标记'质量不达标' → 提交组织者判断是否继续推进"
        deadline: "5个工作日内"
        risk_level: "必须确认"
      
      - name: "合规风险复核"
        trigger: "质控内核提交质量报告后"
        steps:
          - "复核发行人申报条件（法定条件逐项检查）"
          - "复核决策程序完整性：董事会/股东会决议"
          - "复核信息披露充分性"
          - "复核利益冲突（承销商与发行人关联关系）"
          - "出具合规复核意见"
        output: "《合规复核意见》（申报条件/决策程序/信息披露/利益冲突）"
        exception_handling:
          申报条件不满足: "标记'法定障碍' → 不通过 → 退回"
          利益冲突未披露: "标记'利益冲突' → 要求补充披露 → 如无法消除 → 提交组织者判断是否回避"
        deadline: "3个工作日内"
        risk_level: "必须确认"
      
      - name: "重大风险判断与签字决策"
        trigger: "质控报告+合规复核意见齐备"
        steps:
          - "综合审阅质控报告和合规复核意见"
          - "判断重大风险：偿债能力真实性/发行窗口合适性/项目质量评级"
          - "评估团队执行能力"
          - "做出签字决策"
        output: "《签字决策》（重大风险判断/执行能力评估/签字决策）"
        exception_handling:
          重大风险判断为不可控: "不批准申报 → 记录原因 → 通知客户经理"
          执行能力不足: "标记'资源缺口' → 协调资源或推迟申报"
        deadline: "3个工作日内"
        risk_level: "必须确认"
      
      - name: "签字前准备"
        trigger: "全套材料齐备"
        steps:
          - "完成利益冲突排查（个人及关联方）"
          - "确认尽调工作底稿齐全并签字"
          - "确认已履行适当性义务"
          - "准备签字页"
        output: "《利益冲突排查表》+ 《尽职调查声明》+ 《适当性义务履行确认》"
        exception_handling:
          发现利益冲突: "如实披露 → 组织者判断是否回避"
        deadline: "与质控/合规复核并行，5个工作日内"
        risk_level: "必须确认"

