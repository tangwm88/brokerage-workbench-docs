<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组织者工作台 - 业务支持中心 V3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f5f7; --surface: #ffffff; --primary: #2563eb;
            --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
            --text: #1d1d1f; --text-secondary: rgba(0,0,0,0.5);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .top-bar { padding: 12px 16px; background: linear-gradient(135deg, #2563eb, #60a5fa); color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 16px; font-weight: 600; }
        .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 92%; }
        .message-user { align-self: flex-end; background: var(--primary); color: white; padding: 12px 16px; border-radius: 20px 20px 4px 20px; }
        .message-ai { display: flex; gap: 10px; }
        .ai-icon { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #60a5fa); display: flex; align-items: center; justify-content: center; }
        .ai-content { flex: 1; background: var(--surface); padding: 16px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav-center { margin-top: 12px; }
        .biz-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; }
        .biz-entry { background: rgba(0,0,0,0.03); border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s; }
        .biz-entry:hover { background: rgba(0,0,0,0.06); transform: translateY(-2px); }
        .entry-keyword { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .entry-desc { font-size: 11px; color: var(--text-secondary); }
        .task-card { background: var(--surface); border-radius: 12px; padding: 14px; margin: 10px 0; border: 1px solid rgba(0,0,0,0.08); }
        .task-card.urgent { border-left: 3px solid var(--danger); }
        .task-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .task-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
        .task-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); }
        .input-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid rgba(0,0,0,0.08); }
        .input-box { display: flex; gap: 10px; align-items: center; }
        .input-field { flex: 1; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 24px; font-size: 15px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
        .badge-red { background: rgba(255,59,48,0.1); color: var(--danger); }
        .badge-green { background: rgba(52,199,89,0.1); color: var(--success); }
        .badge-blue { background: rgba(37,99,235,0.1); color: var(--primary); }
        .form-group { margin: 12px 0; }
        .form-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
        .form-input, .form-textarea { width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; font-size: 14px; }
        .form-textarea { min-height: 100px; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .radio-item { padding: 8px 14px; background: rgba(0,0,0,0.04); border-radius: 8px; font-size: 13px; cursor: pointer; border: 2px solid transparent; }
        .radio-item.selected { background: rgba(37,99,235,0.1); border-color: var(--primary); color: var(--primary); }
        .ai-suggestion { background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(96,165,250,0.08)); border-radius: 12px; padding: 14px; margin: 12px 0; border-left: 3px solid var(--primary); }
        .status-flow { display: flex; align-items: center; gap: 6px; margin: 12px 0; font-size: 12px; flex-wrap: wrap; }
        .status-step { padding: 4px 8px; border-radius: 4px; background: rgba(0,0,0,0.04); }
        .status-step.active { background: rgba(37,99,235,0.1); color: var(--primary); font-weight: 600; }
        .status-step.completed { background: rgba(52,199,89,0.1); color: var(--success); }
        .section-title { font-size: 14px; font-weight: 600; margin: 16px 0 8px 0; }
        .detail-list { margin: 8px 0; }
        .detail-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; }
        .detail-item:last-child { border-bottom: none; }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 6px; font-size: 13px; }
        .checkbox { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .checkbox.checked { background: var(--success); border-color: var(--success); color: #fff; }
        .info-card { background: rgba(37,99,235,0.05); border-radius: 10px; padding: 12px; margin: 10px 0; }
        .info-card.warning { background: rgba(255,149,0,0.05); border-left: 3px solid var(--warning); }
        .info-card.success { background: rgba(52,199,89,0.05); border-left: 3px solid var(--success); }
        .info-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .info-content { font-size: 12px; color: var(--text-secondary); }
        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; margin-bottom: 8px; }
        .suggestions::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 14px; background: rgba(37,99,235,0.1); border-radius: 16px; font-size: 13px; white-space: nowrap; cursor: pointer; color: var(--primary); }
        .progress-bar { height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }
        .timeline { margin: 12px 0; }
        .timeline-item { display: flex; gap: 10px; margin: 10px 0; }
        .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-top: 6px; }
        .timeline-dot.completed { background: var(--success); }
        .timeline-content { flex: 1; }
        .timeline-time { font-size: 11px; color: var(--text-secondary); }
        .timeline-text { font-size: 13px; margin-top: 2px; }
        .chart-placeholder { background: rgba(0,0,0,0.03); border-radius: 8px; height: 120px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 13px; margin: 10px 0; }
        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; }
        .metric-card { background: rgba(0,0,0,0.02); border-radius: 10px; padding: 14px; text-align: center; }
        .metric-value { font-size: 24px; font-weight: 600; color: var(--primary); }
        .metric-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .rank-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.02); border-radius: 8px; margin: 6px 0; }
        .rank-num { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
        .rank-num.gold { background: #f59e0b; }
        .rank-num.silver { background: #9ca3af; }
        .rank-num.bronze { background: #b45309; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 14px; font-weight: 500; }
        .rank-value { font-size: 12px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div>🏛️ 业务支持中心（组织者工作台）V3</div>
            <div style="font-size: 13px;">AI运行中 🟢</div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <div class="suggestions" id="suggestions"></div>
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入指令或选择快捷操作..." onkeypress="if(event.key==='Enter')send()">
                <button class="btn btn-primary" onclick="send()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        // 完整的五大模块15个功能配置
        const modules = {
            '提示事项': { 
                color: '#ff6b6b', 
                desc: '重大事项、问题反馈、资源协调', 
                count: { total: 3, urgent: 1 },
                submenu: [
                    { name: '重大事项请示', count: 1, urgent: 1 },
                    { name: '问题反馈', count: 1, urgent: 0 },
                    { name: '资源协调', count: 1, urgent: 0 }
                ]
            },
            '业务组织': { 
                color: '#3b82f6', 
                desc: '客户确认、开户审核、系统开通', 
                count: { total: 12, urgent: 0 },
                submenu: [
                    { name: '确认前端客户', count: 5, urgent: 0 },
                    { name: '开户审核确认', count: 3, urgent: 0 },
                    { name: '分支机构跟踪', count: 2, urgent: 0 },
                    { name: '系统开通反馈', count: 2, urgent: 0 }
                ]
            },
            '队伍状况': { 
                color: '#10b981', 
                desc: '团队人员、工作负载、协同管理', 
                count: { total: 22, urgent: 0 },
                submenu: [
                    { name: '机构经纪团队', count: 12, urgent: 0 },
                    { name: '研究所协同', count: 6, urgent: 0 },
                    { name: '资管协同', count: 4, urgent: 0 }
                ]
            },
            '风险提示': { 
                color: '#f59e0b', 
                desc: '集中度、舆情、合规风险监控', 
                count: { total: 5, urgent: 2 },
                submenu: [
                    { name: '集中度风险', count: 1, urgent: 1 },
                    { name: '舆情风险', count: 2, urgent: 1 },
                    { name: '合规检查', count: 2, urgent: 0 }
                ]
            },
            '业绩看板': { 
                color: '#8b5cf6', 
                desc: '业务数据、业绩指标、分析报表', 
                count: { total: 7, urgent: 0 },
                submenu: [
                    { name: '业务概览', count: 1, urgent: 0 },
                    { name: '业绩指标', count: 2, urgent: 0 },
                    { name: '趋势分析', count: 1, urgent: 0 },
                    { name: '排行榜', count: 1, urgent: 0 },
                    { name: '业绩分析', count: 2, urgent: 0 }
                ]
            }
        };

        window.onload = () => {
            addWelcome();
        };

        // 欢迎界面
        function addWelcome() {
            const html = `
                <div class="message message-ai">
                    <div class="ai-icon">🏛️</div>
                    <div class="ai-content">
                        <div style="font-weight:600;margin-bottom:8px;">🤖 您好！我是业务支持中心AI助手</div>
                        <div style="font-size:14px;color:var(--text-secondary);">今日待办：23项 · 🔴 紧急 3项</div>
                        <div class="biz-grid" style="margin-top:12px;">
                            ${Object.entries(modules).map(([name, data]) => `
                                <div class="biz-entry" onclick="enterModule('${name}')">
                                    <div class="entry-keyword" style="color:${data.color}">${name}</div>
                                    <div class="entry-desc">${data.desc}</div>
                                    <div style="margin-top:6px;font-size:12px;">
                                        ${data.count.urgent > 0 ? `<span style="color:var(--danger);font-weight:500;">🔴 ${data.count.urgent} 紧急</span> · ` : ''}
                                        <span style="font-weight:500;">${data.count.total} 项</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            chat.innerHTML = html;
            updateSuggestions(['重大事项请示', '客户确认', '开户审核', '团队负载', '风险预警', '业绩概览']);
        }

        function enterModule(name) {
            send(name);
        }

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;
            
            chat.innerHTML += `<div class="message message-user">${msg}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            setTimeout(() => processResponse(msg), 300);
        }

        function processResponse(msg) {
            // ===== 提示事项模块 =====
            if (msg === '重大事项请示' || msg.includes('请示')) {
                showMajorRequest();
            } else if (msg === '问题反馈' || msg.includes('反馈')) {
                showIssueFeedback();
            } else if (msg === '资源协调' || msg.includes('协调')) {
                showResourceCoordination();
            }
            // ===== 业务组织模块 =====
            else if (msg === '确认前端客户' || msg.includes('客户确认')) {
                showCustomerConfirm();
            } else if (msg === '开户审核确认' || msg.includes('开户审核')) {
                showAccountAudit();
            } else if (msg === '分支机构跟踪' || msg.includes('分支')) {
                showBranchTracking();
            } else if (msg === '系统开通反馈' || msg.includes('系统开通')) {
                showSystemFeedback();
            }
            // ===== 队伍状况模块 =====
            else if (msg === '机构经纪团队' || msg.includes('团队')) {
                showTeamStatus();
            } else if (msg === '研究所协同' || msg.includes('研究所')) {
                showResearchCoordination();
            } else if (msg === '资管协同' || msg.includes('资管')) {
                showAssetManagementCoordination();
            }
            // ===== 风险提示模块 =====
            else if (msg === '集中度风险' || (msg.includes('风险') && msg.includes('集中'))) {
                showConcentrationRisk();
            } else if (msg === '舆情风险' || msg.includes('舆情')) {
                showSentimentRisk();
            } else if (msg === '合规检查' || msg.includes('合规')) {
                showComplianceCheck();
            }
            // ===== 业绩看板模块 =====
            else if (msg === '业务概览' || msg.includes('概览')) {
                showBusinessOverview();
            } else if (msg === '业绩指标' || msg.includes('指标')) {
                showPerformanceMetrics();
            } else if (msg === '趋势分析' || msg.includes('趋势')) {
                showTrendAnalysis();
            } else if (msg === '排行榜' || msg.includes('排名')) {
                showLeaderboard();
            } else if (msg === '业绩分析' || msg.includes('分析')) {
                showPerformanceAnalysis();
            }
            // ===== 模块菜单 =====
            else if (modules[msg]) {
                showModuleMenu(msg);
            }
            // ===== 默认响应 =====
            else {
                chat.innerHTML += `
                    <div class="message message-ai">
                        <div class="ai-icon">🏛️</div>
                        <div class="ai-content">
                            收到。请从下方选择功能模块：
                            <div class="suggestions" style="margin-top:12px;">
                                ${Object.keys(modules).map(m => `<span class="chip" onclick="send('${m}')">${m}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        // ==================== 1. 重大事项请示 ====================
        function showMajorRequest() {
            chat.innerHTML += `
                <div class="message message-ai">
                    <div class="ai-icon">📝</div>
                    <div class="ai-content">
                        <div style="font-weight:600;margin-bottom:12px;">重大事项请示 - 新建申请</div>
                        
                        <div class="form-group">
                            <label class="form-label">请示类型</label>
                            <div class="radio-group">
                                <div class="radio-item selected" onclick="selectRadio(this)">战略客户政策</div>
                                <div class="radio-item" onclick="selectRadio(this)">重大资源投入</div>
                                <div class="radio-item" onclick="selectRadio(this)">跨部门协调</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">客户名称</label>
                            <input type="text" class="form-input" value="华泰资管">
                        </div>

                        <div class="ai-suggestion">
                            <div style="font-weight:600;color:var(--primary);margin-bottom:6px;">🤖 AI生成请示草稿</div>
                            <div style="font-size:13px;">基于客户历史数据，已自动生成请示背景和业务分析</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">请示内容</label>
                            <textarea class="form-textarea">关于申请华泰资管费率优惠的请示

一、客户背景
华泰资管是我司核心战略客户，合作年限3年，当前托管规模50亿元。

二、业务机会
客户拟新增股票交易规模20亿元，预计年交易量400亿元。

三、具体诉求
申请股票交易佣金费率由万3下调至万1.5。

四、预期收益
预计年收入增加500万元，同时巩固客户关系。</textarea>
                        </div>

                        <div class="status-flow">
                            <div class="status-step active">草稿</div>
                            <span>→</span>
                            <div class="status-step">部门审核</div>
                            <span>→</span>
                            <div class="status-step">分管副总</div>
                            <span>→</span>
                            <div class="status-step">完成</div>
                        </div>

                        <div class="info-card">
                            <div class="info-title">🎯 推荐审批人</div>
                            <div class="info-content">王总（分管副总）- 基于请示类型和金额推荐</div>
                        </div>

                        <div class="task-actions">
                            <button class="btn btn-success" onclick="submitSuccess('请示已提交', 'REQ-20240308-001')">✓ 提交请示</button>
                            <button class="btn btn-secondary">保存草稿</button>
                            <button class="btn btn-secondary">重新生成</button>
                        </div>
                    </div>
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
            updateSuggestions(['提交请示', '保存草稿', '返回工作台']);
        }

        // ==================== 2. 问题反馈 ====================
        function showIssueFeedback() {
            chat.innerHTML += `
                <div class="message message-ai">
                    <div class="ai-icon">🐛</div>
                    <div class="ai-content">
                        <div style="font-weight:600;margin-bottom:12px;">问题反馈 - 新建工单</div>
                        
                        <div class="form-group">
                            <label class="form-label">问题类型</label>
                            <div class="radio-group">
                                <div class="radio-item selected" onclick="selectRadio(this)">系统故障</div>
                                <div class="radio-item" onclick="selectRadio(this)">流程问题</div>
                                <div class="radio-item" onclick="selectRadio(this)">协作障碍</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">问题描述</label>
                            <textarea class="form-textarea" placeholder="请详细描述您遇到的问题...">极速柜台系统今天早上9点开始无法登录，提示"连接超时"...</textarea>
                        </div>

                        <div class="ai-suggestion" style="border-left-color:var(--warning);">
                            <div style="font-weight:600;color:var(--warning);margin-bottom:6px;">💡 AI智能分析</div>
                            <div style="font-size:13px;">
                                <div>发现3个相似问题：</div>
                                <div>• 网络连接问题（已解决）</div>
                                <div>• 证书过期问题（已解决）</div>
                                <div style="margin-top:6px;">🔍 可能原因：网络连接不稳定 / 系统维护中</div>
                                <div>💡 建议操作：1. 检查网络 2. 联系IT运维</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">紧急程度</label>
                            <div class="radio-group">
                                <div class="radio-item" onclick="selectRadio(this)">低</div>
                                <div class="radio-item" onclick="selectRadio(this)">中</div>
                                <div class="radio-item selected" onclick="selectRadio(this)">高（影响业务）</div>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-title">🎯 自动派单</div>
                            <div class="info-content">IT运维部 - 张三 · 预计处理时间：2小时内</div>
                        </div>

                        <div class="task-actions">
                            <button class="btn btn-primary" onclick="submitSuccess('工单已提交', 'TK-20240308-001')">提交工单</button>
                            <button class="btn btn-secondary">保存</button>
                        </div>
                    </div>
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
            updateSuggestions(['提交工单', '查看历史工单', '返回']);
        }

        // ==================== 3. 资源协调 ====================
        function showResourceCoordination() {
            chat.innerHTML += `
                <div class="message message-ai">
                    <div class="ai-icon">🔧</div>
                    <div class="ai-content">
                        <div style="font-weight:600;margin-bottom:12px;">资源协调申请</div>
                        
                        <div class="form-group">
                            <label class="form-label">资源类型</label>
                            <div class="radio-group">
